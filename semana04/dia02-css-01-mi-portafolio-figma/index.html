<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi portafolio</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header wrapper">
    <span class="header__logo">{vv}</span>

    <nav class="header__menu">
      <a href="#acerca-de-mi" class="header__menu--active">acerca de mi</a>
      <a href="#habilidades">habilidades</a>
      <a href="#portafolio">portafolio</a>
    </nav>

    <div class="header__links">
      <img src="images/icon-github.svg" alt="Github">
      <img src="images/icon-linkedin.svg" alt="LinkedIn">
    </div>
  </header>

  <main>
    <section class="hero hero--bg">
      <h2 class="hero__gretting">Hola, Soy <span>Victor Villazón</span> 💪</h2>
      <h1 class="hero__title">Desarrollador web full-stack</h1>
      <p class="hero__description">Desarrollador especializado en Javascript, React.js, Vue, Python y Node.js.</p>

      <img class="hero__photo" src="https://placehold.co/278x278" alt="Victor Villazón Desarrollador web full-stack">

      <div class="stack">

        <div class="stack__wrap">
          <h3 class="stack__title">HTML</h3>
          <div class="stack__box">
            <img src="images/icon-html5.svg" width="70" height="70" alt="HTML">
          </div>
        </div>

        <div class="stack__wrap">
          <h3 class="stack__title">CSS</h3>
          <div class="stack__box">
            <img src="images/icon-css3.svg" width="70" height="70" alt="CSS">
          </div>
        </div>

        <div class="stack__wrap">
          <h3 class="stack__title">Javascript</h3>
          <div class="stack__box">
            <img src="images/icon-javascript.svg" width="70" height="70" alt="Javascript">
          </div>
        </div>

        <div class="stack__wrap">
          <h3 class="stack__title">React.js</h3>
          <div class="stack__box">
            <img src="images/icon-reactjs.svg" width="70" height="70" alt="React.js">
          </div>
        </div>

        <div class="stack__wrap">
          <h3 class="stack__title">Node.js</h3>
          <div class="stack__box">
            <img src="images/icon-nodejs.svg" width="70" height="70" alt="Node.js">
          </div>
        </div>

        <div class="stack__wrap">
          <h3 class="stack__title">Python</h3>
          <div class="stack__box">
            <img src="images/icon-python.svg" width="70" height="70" alt="Python">
          </div>
        </div>

      </div>
    </section>
  </main>
</body>
</html>
