<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor Villazón - Página personal</title>
</head>
<body>
  <header>
    <h1>Victor Villazón</h1>

    <nav>
      <a href="#sobre-mi">Sobre mí</a>
      <a href="#contacto">Contacto</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Sobre mí</h2>

      <img src="yo.png" alt="">

      <p>Soy un desarrollador web full-stack.</p>

      <h3>Mis habilidades</h3>

      <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
        <li>React.js</li>
      </ul>

    </section>

    <section>
      <h2>Contacto</h2>

      <form>
        <label>
          Nombres completos
          <input type="text" placeholder="Ej. Pepe Lota">
        </label>

        <br>

        <label>
          Correo electrónico
          <input type="email" placeholder="Ej. tucorreo@gmail.com">
        </label>

        <br>

        <label>
          Mensaje
          <textarea placeholder="Agrega tu mensaje aquí..."></textarea>
        </label>

        <input type="submit" value="Enviar">
      </form>
    </section>
  </main>

  <footer>
    <small>&copy; Marzo 2026</small>
  </footer>
</body>
</html>
