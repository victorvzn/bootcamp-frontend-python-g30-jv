<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Pokemons</title>
</head>
<body>
  <main class="pokemon-app">
    <div class="pokemon-wapper">
      <h1>Lista de Pokemons</h1>

      <strong id="favoritePokemons">Favoritos: 0</strong>

      <section id="pokemonList" class="pokemon-list"></section>

      <div class="pokemon-pagination">
        <button id="firstPage" class="pokemon-button">Primero</button>
        <button id="prevPage" class="pokemon-button">Anterior</button>
        <span id="currentPage">1</span>
        <button id="nextPage" class="pokemon-button">Siguiente</button>
        <button id="lastPage" class="pokemon-button">Último</button>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
